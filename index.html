<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>🚀 Student Task Manager</h1>

    <!-- 🔧 CHANGE: Toggle button centered -->
    <button id="modeToggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>

    <!-- 🔧 CHANGE: CLEAN INPUT STRUCTURE -->
    <div class="input-section">

        <input type="text" id="taskInput" placeholder="Enter a task...">

        <select id="priority">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
        </select>

        <!-- 🔧 CHANGE: ICON BUTTON (NOT INPUT BOX) -->
        <button onclick="openCalendar()" class="calendar-btn" title="Select Deadline">📅</button>

        <button onclick="addTask()" class="add-btn">Add</button>

    </div>

    <!-- 🔧 CHANGE: Hidden date OUTSIDE layout -->
    <input type="date" id="deadline" style="display:none;">

    <p id="taskCount">Total Tasks: 0</p>

    <div class="filters">
        <button onclick="filterTasks('all')">All</button>
        <button onclick="filterTasks('completed')">Completed</button>
        <button onclick="filterTasks('pending')">Pending</button>
    </div>

    <button onclick="clearAllTasks()" class="clear-btn">🗑 Clear All</button>

    <ul id="taskList"></ul>

</div>

<!-- 🔥 VERY IMPORTANT FIX -->
<script src="script.js"></script>

</body>
</html>
