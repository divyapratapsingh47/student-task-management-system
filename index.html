<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Task Manager</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h1>🚀 Student Task Manager</h1>

    <button onclick="toggleDarkMode()" class="dark-btn">🌙 Dark Mode</button>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter a task...">

        <select id="priority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>

        <!-- Hidden date input -->
        <input type="date" id="dueDate" class="hidden-date">

        <!-- Calendar Icon -->
        <button class="icon-btn" onclick="openCalendar()" title="Select date">
            📅
        </button>

        <button onclick="addTask()">Add</button>
    </div>

    <p id="taskCount">Total Tasks: 0</p>

    <div class="filters">
        <button onclick="filterTasks('all')">All</button>
        <button onclick="filterTasks('completed')">Completed</button>
        <button onclick="filterTasks('pending')">Pending</button>
    </div>

    <button onclick="clearAllTasks()" class="clear-btn">🗑 Clear All</button>

    <ul id="taskList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
