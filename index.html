<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Student Task Manager</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h2>🚀 Student Task Manager</h2>

    <button id="modeToggle" onclick="toggleDarkMode()">🌙 Dark Mode</button>

    <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter a task...">

        <select id="priority">
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
        </select>

        <!-- CALENDAR BUTTON -->
        <button class="calendar-btn tooltip" onclick="openCalendar(event)">
            📅
            <span class="tooltip-text">Select Deadline</span>
        </button>

        <input type="date" id="deadline" hidden>

        <button class="add-btn" onclick="addTask()">Add</button>
    </div>

    <p>Total Tasks: <span id="count">0</span></p>

    <div class="filters">
        <button onclick="filterTasks('all')">All</button>
        <button onclick="filterTasks('completed')">Completed</button>
        <button onclick="filterTasks('pending')">Pending</button>
    </div>

    <button class="clear-btn" onclick="clearAll()">🗑 Clear All</button>

    <ul id="taskList"></ul>
</div>

<script src="script.js"></script>
</body>
</html>
