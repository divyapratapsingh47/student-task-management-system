<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Task Manager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h1>🚀 Student Task Manager</h1>

    <!-- DARK MODE -->
    <button onclick="toggleDarkMode()" id="modeBtn">🌙 Dark Mode</button>

    <!-- INPUT ROW -->
    <div class="input-row">
        <input type="text" id="taskInput" placeholder="Enter a task...">

        <select id="priority">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
        </select>

        <!-- CALENDAR BUTTON -->
        <div class="tooltip">
            <button class="icon-btn" onclick="openDate()">📅</button>
            <span class="tooltip-text">Select Deadline</span>
        </div>

        <!-- HIDDEN DATE INPUT -->
        <input type="date" id="dateInput">

        <button onclick="addTask()">Add</button>
    </div>

    <p id="taskCount">Total Tasks: 0</p>

    <!-- FILTERS -->
    <div class="filters">
        <button onclick="filterTasks('all')">All</button>
        <button onclick="filterTasks('completed')">Completed</button>
        <button onclick="filterTasks('pending')">Pending</button>
    </div>

    <button class="clear-btn" onclick="clearAllTasks()">🗑 Clear All</button>

    <ul id="taskList"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
